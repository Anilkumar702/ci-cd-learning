name: CI Build

# Run CI on changes pushed to main and for pull requests targeting main.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository code so workflow can run against it.
      - uses: actions/checkout@v4

      # Set the Node.js version used for install and test.
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Cache npm artifacts to speed up repeated workflow runs.
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Install dependencies from package-lock.json for deterministic installs.
      - run: npm ci

      # Run unit tests to validate changes before building.
      - run: npm run test

      # Build the production bundle after tests pass.
      - run: npm run build
